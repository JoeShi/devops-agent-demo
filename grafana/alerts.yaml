# Prometheus alerting rules for Outline application
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: outline-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: outline.app
      rules:
        - alert: OutlinePodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="outline"}[15m]) * 60 * 15 > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Outline pod {{ $labels.pod }} is crash looping"
            description: "Pod {{ $labels.pod }} restarted {{ $value | humanize }} times in the last 15 minutes."

        - alert: OutlinePodHighMemory
          expr: |
            container_memory_working_set_bytes{namespace="outline",container="outline"}
            / container_spec_memory_limit_bytes{namespace="outline",container="outline"} > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Outline pod {{ $labels.pod }} memory usage above 85%"
            description: "Memory usage is {{ $value | humanizePercentage }} of limit."

        - alert: OutlinePodCPUThrottling
          expr: |
            sum(increase(container_cpu_cfs_throttled_periods_total{namespace="outline",container="outline"}[5m]))
            / sum(increase(container_cpu_cfs_periods_total{namespace="outline",container="outline"}[5m])) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Outline pods CPU throttling above 50%"
            description: "{{ $value | humanizePercentage }} of CPU periods are being throttled."

        - alert: OutlineReplicasUnavailable
          expr: |
            kube_deployment_status_replicas_available{namespace="outline",deployment="outline-web"}
            < kube_deployment_spec_replicas{namespace="outline",deployment="outline-web"}
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Outline web has unavailable replicas"

        - alert: OutlineQueueBacklog
          expr: outline_queue_tasks_count{env="production"} > 100
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Outline task queue backlog above 100"
            description: "{{ $value }} tasks pending in queue for over 10 minutes."

        - alert: OutlineQueueDelayed
          expr: outline_queue_tasks_delayed_count{env="production"} > 50
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Outline delayed tasks above 50"
            description: "{{ $value }} delayed tasks, worker may be stuck."

        - alert: OutlineTargetDown
          expr: up{job="outline-web"} == 0
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "Outline metrics target is down"
            description: "Prometheus cannot scrape outline-web, pod may be unreachable."

    - name: outline.infra
      rules:
        - alert: RDSHighConnections
          expr: aws_rds_database_connections_average > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "RDS connection count above 80"

        - alert: RDSHighCPU
          expr: aws_rds_cpuutilization_average > 80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "RDS CPU utilization above 80%"

        - alert: RedisHighMemory
          expr: aws_elasticache_database_memory_usage_percentage_average > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Redis memory usage above 80%"
