# Secrets are managed by AWS Secrets Manager + External Secrets Operator.
# See k8s/external-secret.yaml for the ExternalSecret definition.
#
# To update secrets:
#   aws secretsmanager update-secret --secret-id outline/production \
#     --secret-string '{"DATABASE_URL":"...","REDIS_URL":"...","SECRET_KEY":"...","UTILS_SECRET":"..."}'
#
# ESO will auto-sync changes within the refreshInterval (1h).
# To force immediate sync:
#   kubectl annotate externalsecret outline -n outline force-sync=$(date +%s) --overwrite
