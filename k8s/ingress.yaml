apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: outline
  namespace: outline
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /_health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Replace with your ACM certificate ARN from: terraform output -raw acm_certificate_arn
    # Or find it: aws acm list-certificates --query "CertificateSummaryList[?DomainName=='alb-<YOUR_DOMAIN>'].CertificateArn"
    alb.ingress.kubernetes.io/certificate-arn: "${ACM_CERTIFICATE_ARN}"
spec:
  rules:
    # Primary domain — matches CloudFront origin requests (Host: alb-<domain>)
    - host: alb-outline.devops-agent.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: outline-web
                port:
                  number: 80
    # Direct ALB access domain
    - host: outline.devops-agent.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: outline-web
                port:
                  number: 80
