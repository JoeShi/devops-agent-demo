apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: outline
  namespace: outline
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /_health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:604179600882:certificate/6ea81750-36f3-4d9f-8151-f774927d2e5e
spec:
  rules:
    - host: alb-outline.devops-agent.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: outline-web
                port:
                  number: 80
    - host: outline.devops-agent.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: outline-web
                port:
                  number: 80
